<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Movies</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <p>search is here</p>
<ion-searchbar [(ngModel)]="query" (ionInput)="search($event)"></ion-searchbar>
<p>search wa there</p>

 @for(movie of movies;track movie){                
  <ion-card (click)="goToDetailsPage(movie.imdbID)">
    <img alt="Poster" src={{movie.Poster}} width="400" height="400">
    <ion-card-header>
      <ion-card-title>{{movie.Title}}</ion-card-title>
      <ion-card-subtitle>{{movie.Year}}</ion-card-subtitle>
    </ion-card-header>
  </ion-card>
}
</ion-content>
